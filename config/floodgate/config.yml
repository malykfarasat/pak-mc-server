# Floodgate config template.
# The workflow may delete this file before runtime so Floodgate can regenerate
# a fully compatible version for the installed mod build.

username-prefix: "."
replace-spaces: true
default-locale: system

player-link:
  enabled: true
  require-link: false
  allow-linking: true
  type: sqlite
  config: ""

metrics:
  enabled: false

config-version: 3
