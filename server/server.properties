#Minecraft server properties
#PAK MC SERVER - We Will Rise Again
#Optimized for cross-version + Bedrock play via Geyser/Floodgate/ViaVersion

# ── Network ───────────────────────────────────────────────────────────────────
server-ip=0.0.0.0
server-port=25565
online-mode=false
prevent-proxy-connections=false
network-compression-threshold=256
# online-mode=false is REQUIRED for Floodgate (Bedrock players) to work.
# It also allows TLauncher / offline accounts to join.

# ── World ─────────────────────────────────────────────────────────────────────
level-name=world
level-type=minecraft\:normal
level-seed=
gamemode=survival
difficulty=normal
hardcore=false
pvp=true
allow-flight=true
allow-nether=true
generate-structures=true

# ── Players ───────────────────────────────────────────────────────────────────
max-players=20
white-list=false
enforce-whitelist=false
player-idle-timeout=0
spawn-protection=4
op-permission-level=4

# ── Performance (tuned for GitHub Actions 7GB runner) ─────────────────────────
view-distance=8
simulation-distance=6
max-tick-time=60000
entity-broadcast-range-percentage=100
max-world-size=29999984
sync-chunk-writes=true

# ── MOTD ──────────────────────────────────────────────────────────────────────
motd=\u00a7b\u00a7lPAK MC SERVER \u00a7r\u00a77| \u00a7aJava + Bedrock \u00a7r\u00a77| \u00a7eWe Will Rise Again

# ── Gameplay ──────────────────────────────────────────────────────────────────
spawn-animals=true
spawn-monsters=true
spawn-npcs=true
force-gamemode=false
enable-command-block=true
function-permission-level=2

# ── Resource pack ─────────────────────────────────────────────────────────────
resource-pack=
resource-pack-sha1=
require-resource-pack=false
resource-pack-prompt=

# ── Security ──────────────────────────────────────────────────────────────────
enable-rcon=true
rcon.port=25575
rcon.password=CHANGE_ME_VIA_SECRET
broadcast-rcon-to-ops=true
enable-query=false
hide-online-players=false
enforce-secure-profile=false
