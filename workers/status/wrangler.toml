name = "pak-mc-status"
main = "src/index.js"
compatibility_date = "2024-11-01"

# ── Environment variables (public — fine to commit) ──────────────────────────
[vars]
MC_HOST      = "mc.pakanonymous.org"
BEDROCK_PORT = "19132"
GH_REPO      = "malykfarasat/pak-mc-server"

# ── Custom domain ─────────────────────────────────────────────────────────────
# Requires pakanonymous.org to be on Cloudflare. Uncomment after deploying once.
[[routes]]
pattern       = "status.pakanonymous.org"
zone_name     = "pakanonymous.org"
custom_domain = true
