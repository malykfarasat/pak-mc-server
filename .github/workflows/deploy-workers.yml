name: 🚀 Deploy Cloudflare Workers

on:
  push:
    branches: [main, master]
    paths:
      - "workers/**"
      - ".github/workflows/deploy-workers.yml"
  workflow_dispatch:

jobs:
  deploy-status:
    name: Deploy Status Worker
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Validate required Cloudflare secrets
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          [ -n "$CLOUDFLARE_API_TOKEN" ] || (echo "::error::CLOUDFLARE_API_TOKEN missing" && exit 1)
          [ -n "$CLOUDFLARE_ACCOUNT_ID" ] || (echo "::error::CLOUDFLARE_ACCOUNT_ID missing" && exit 1)

      - name: Install wrangler
        run: npm install -g wrangler@4

      - name: Deploy status worker
        working-directory: workers/status
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: wrangler deploy

      - name: Smoke test public status endpoint
        run: |
          curl -fsSL "https://status.pakanonymous.org/api/ping"

  deploy-admin:
    name: Deploy Admin Worker
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Validate required admin secrets
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
          SESSION_SECRET: ${{ secrets.SESSION_SECRET }}
          GH_DISPATCH_TOKEN: ${{ secrets.GH_DISPATCH_TOKEN }}
        run: |
          [ -n "$CLOUDFLARE_API_TOKEN" ] || (echo "::error::CLOUDFLARE_API_TOKEN missing" && exit 1)
          [ -n "$CLOUDFLARE_ACCOUNT_ID" ] || (echo "::error::CLOUDFLARE_ACCOUNT_ID missing" && exit 1)
          [ -n "$GOOGLE_CLIENT_ID" ] || (echo "::error::GOOGLE_CLIENT_ID missing" && exit 1)
          [ -n "$GOOGLE_CLIENT_SECRET" ] || (echo "::error::GOOGLE_CLIENT_SECRET missing" && exit 1)
          [ -n "$SESSION_SECRET" ] || (echo "::error::SESSION_SECRET missing" && exit 1)
          [ -n "$GH_DISPATCH_TOKEN" ] || (echo "::error::GH_DISPATCH_TOKEN missing" && exit 1)

      - name: Install wrangler
        run: npm install -g wrangler@4

      - name: Push secrets to admin worker
        working-directory: workers/admin
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
          SESSION_SECRET: ${{ secrets.SESSION_SECRET }}
          GITHUB_PAT: ${{ secrets.GH_DISPATCH_TOKEN }}
        run: |
          echo "$GOOGLE_CLIENT_ID"     | wrangler secret put GOOGLE_CLIENT_ID
          echo "$GOOGLE_CLIENT_SECRET" | wrangler secret put GOOGLE_CLIENT_SECRET
          echo "$SESSION_SECRET"       | wrangler secret put SESSION_SECRET
          echo "$GITHUB_PAT"            | wrangler secret put GITHUB_PAT

      - name: Deploy admin worker
        working-directory: workers/admin
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: wrangler deploy

      - name: Smoke test admin health endpoint
        run: |
          curl -fsSL "https://admin.pakanonymous.org/healthz"
