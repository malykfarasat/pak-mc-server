name: 🎮 PAK MC SERVER

on:
  workflow_dispatch:
    inputs:
      memory:
        description: "RAM Allocation (e.g. 5G, 8G)"
        required: false
        default: "6G"
      duration:
        description: "Run Duration (minutes)"
        required: false
        default: "340"
      motd:
        description: "Server Message (MOTD)"
        required: false
        default: "PAK MC SERVER — We Will Rise Again"

jobs:
  minecraft:
    name: 🎮 PAK MC SERVER
    runs-on: ubuntu-latest

    env:
      MC_VERSION: "1.21.1"
      FABRIC_LOADER_VERSION: "0.16.9"
      FABRIC_INSTALLER_VERSION: "1.0.1"

    steps:
      # ── 1. Checkout Repository ─────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Greeting & Setup ────────────────────────────────────────────────
      - name: Welcome message
        run: |
          echo "════════════════════════════════════════════════════"
          echo "   🇵🇰  PAK MC SERVER — INFRASTRUCTURE STARTUP  🇵🇰   "
          echo "════════════════════════════════════════════════════"

      # ── 3. Java 21 ─────────────────────────────────────────────────────────
      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      # ── 4. Download Fabric server JAR ──────────────────────────────────────
      - name: Download Fabric server
        run: |
          echo "⬇️  Downloading Fabric server for MC $MC_VERSION..."
          URL="https://meta.fabricmc.net/v2/versions/loader/${MC_VERSION}/${FABRIC_LOADER_VERSION}/${FABRIC_INSTALLER_VERSION}/server/jar"
          curl -fsSL "$URL" -o fabric-server.jar
          ls -lh fabric-server.jar

      # ── 5. Install mods ────────────────────────────────────────────────────
      - name: Install server mods
        env:
          MC_VERSION: ${{ env.MC_VERSION }}
        run: |
          chmod +x scripts/install-mods.sh
          ./scripts/install-mods.sh

      - name: Verify bridge mods
        run: |
          test -f mods/geyser-fabric.jar
          test -f mods/floodgate-fabric.jar
          echo "✅ Geyser + Floodgate Fabric mods detected"

      # ── 6. Accept EULA ─────────────────────────────────────────────────────
      - name: Accept EULA
        run: echo "eula=true" > eula.txt

      # ── 7. Apply custom MOTD if provided ───────────────────────────────────
      - name: Apply custom MOTD
        if: github.event.inputs.motd != ''
        run: |
          sed -i "s|^motd=.*|motd=${{ github.event.inputs.motd }}|" server.properties

      # ── 8. Configure RCON ──────────────────────────────────────────────────
      - name: Configure RCON
        env:
          RCON_PASSWORD: ${{ secrets.RCON_PASSWORD }}
        run: |
          if [ -n "$RCON_PASSWORD" ]; then
            sed -i "s|^rcon.password=.*|rcon.password=$RCON_PASSWORD|" server.properties
            echo "✅ RCON password set from secret"
          else
            RANDOM_PW=$(openssl rand -hex 16)
            sed -i "s|^rcon.password=.*|rcon.password=$RANDOM_PW|" server.properties
            echo "::notice::RCON password randomized"
          fi

      # ── 9. Restore persistence from cache ──────────────────────────────────
      - name: Restore persistence from cache
        id: cache-persistence
        uses: actions/cache@v4
        with:
          path: |
            world
            config
            playit.toml
          key: pak-mc-root-persistence-${{ github.run_id }}
          restore-keys: |
            pak-mc-root-persistence-

      # ── 10. Install playit.gg agent ────────────────────────────────────────
      - name: Install playit.gg agent
        run: |
          echo "⬇️  Downloading playit.gg agent..."
          curl -fsSL https://github.com/playit-cloud/playit-agent/releases/latest/download/playit-linux-amd64 -o playit
          chmod +x playit
          ./playit --version || true

      # ── 11. Start playit tunnel ────────────────────────────────────────────
      - name: Start playit tunnel
        env:
          PLAYIT_SECRET: ${{ secrets.PLAYIT_SECRET_KEY }}
        run: |
          if [ -z "$PLAYIT_SECRET" ]; then
            echo "::warning::No PLAYIT_SECRET_KEY — starting in guest mode (claim URL will appear below)"
            nohup ./playit > playit.log 2>&1 &
          else
            echo "🔒 Starting playit with saved secret..."
            nohup ./playit --secret "$PLAYIT_SECRET" > playit.log 2>&1 &
          fi
          # Give it time to connect and get an address
          sleep 20
          echo "────── playit.log ──────"
          cat playit.log || true
          echo "────────────────────────"

      # ── 12. Display Connection Info ─────────────────────────────────────────
      - name: Display Connection Info
        run: |
          echo "🔍 Parsing playit tunnel address..."

          # Try various patterns for playit address output
          IP=$(grep -oE 'tcp://[a-z0-9.-]+:[0-9]+' playit.log | head -n1 | sed 's|tcp://||')
          [ -z "$IP" ] && IP=$(grep -oE '[a-z0-9-]+\.at\.ply\.gg:[0-9]+' playit.log | head -n1)
          [ -z "$IP" ] && IP=$(grep -oE '[a-z0-9-]+\.ply\.gg:[0-9]+' playit.log | head -n1)
          [ -z "$IP" ] && IP=$(grep -iE 'address|connect|host' playit.log | grep -oE '[a-z0-9.-]+\.[a-z]{2,}:[0-9]+' | head -n1)

          if [ -n "$IP" ]; then
            HOST="${IP%:*}"
            PORT="${IP#*:}"
            echo ""
            echo "╔══════════════════════════════════════════════════╗"
            echo "║      🇵🇰  PAK MC SERVER — HOW TO JOIN  🇵🇰        ║"
            echo "╠══════════════════════════════════════════════════╣"
            echo "║  ☕ JAVA / TLAUNCHER:                            ║"
            echo "║     Server IP: $IP"
            echo "║     Version:   Fabric 1.21.1 (any version works) ║"
            echo "╠══════════════════════════════════════════════════╣"
            echo "║  🎮 BEDROCK (Xbox / Mobile / PS):               ║"
            echo "║     Address:   $HOST"
            echo "║     Port:      19132                             ║"
            echo "╚══════════════════════════════════════════════════╝"
            echo ""
          else
            echo "⚠️  Playit tunnel address not found in log."
            echo "    Dumping full playit.log for debugging:"
            cat playit.log || true
            echo ""
            echo "╔══════════════════════════════════════════════════════════╗"
            echo "║  ℹ️ SERVER IS RUNNING but tunnel address is unavailable.  ║"
            echo "║  Check the 'playit-log' artifact in the Actions summary. ║"
            echo "╚══════════════════════════════════════════════════════════╝"
          fi

      # ── 13. Schedule graceful shutdown ─────────────────────────────────────
      - name: Schedule graceful shutdown
        env:
          DURATION_MIN: ${{ github.event.inputs.duration || '340' }}
        run: |
          (
            sleep $((DURATION_MIN * 60))
            echo "⏰ Duration limit reached — stopping server"
            pkill -SIGTERM -f "fabric-server.jar" || true
          ) &
          echo "⏱️  Shutdown timer armed: $DURATION_MIN minutes"

      # ── 14. Start the Minecraft server ────────────────────────────────────
      - name: Start Minecraft server
        env:
          MEMORY: ${{ github.event.inputs.memory || '6G' }}
        run: |
          echo "🚀 Launching server with ${MEMORY} RAM"
          echo "════════════════════════════════════════════════════"
          java -Xmx${MEMORY} -Xms2G \
            -XX:+UseG1GC \
            -XX:+ParallelRefProcEnabled \
            -XX:MaxGCPauseMillis=200 \
            -XX:+UnlockExperimentalVMOptions \
            -XX:+DisableExplicitGC \
            -XX:+AlwaysPreTouch \
            -XX:G1NewSizePercent=30 \
            -XX:G1MaxNewSizePercent=40 \
            -XX:G1HeapRegionSize=8M \
            -XX:G1ReservePercent=20 \
            -XX:G1HeapWastePercent=5 \
            -XX:G1MixedGCCountTarget=4 \
            -XX:InitiatingHeapOccupancyPercent=15 \
            -XX:G1MixedGCLiveThresholdPercent=90 \
            -XX:G1RSetUpdatingPauseTimePercent=5 \
            -XX:SurvivorRatio=32 \
            -XX:+PerfDisableSharedMem \
            -XX:MaxTenuringThreshold=1 \
            -Dusing.aikars.flags=https://mcflags.emc.gs \
            -Daikars.new.flags=true \
            -jar fabric-server.jar nogui

      # ── 15. Upload world save as artifact ─────────────────────────────────
      - name: Upload world backup
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: world-backup-${{ github.run_number }}
          path: |
            world/
            logs/
          retention-days: 30
          if-no-files-found: warn

      # ── 16. Upload debug logs ──────────────────────────────────────────────
      - name: Upload debug logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: debug-logs-${{ github.run_number }}
          path: |
            playit.log
          retention-days: 7
          if-no-files-found: ignore
