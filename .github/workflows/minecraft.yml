name: PAK MC SERVER Runtime

on:
  workflow_dispatch:
    inputs:
      memory:
        description: "RAM Allocation (3G-6G)"
        required: false
        default: "5G"
      duration:
        description: "Run Duration (minutes)"
        required: false
        default: "340"
      motd:
        description: "Server MOTD override"
        required: false
        default: "PAK MC SERVER - We Will Rise Again"

concurrency:
  group: pak-mc-server-runtime
  cancel-in-progress: false

jobs:
  minecraft:
    name: Start Minecraft Runtime
    runs-on: ubuntu-latest
    env:
      MC_VERSION: "1.21.1"
      FABRIC_LOADER_VERSION: "0.16.9"
      FABRIC_INSTALLER_VERSION: "1.0.1"
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Validate runtime inputs
        env:
          MEMORY_INPUT: ${{ github.event.inputs.memory || '5G' }}
          DURATION_INPUT: ${{ github.event.inputs.duration || '340' }}
        run: |
          case "$MEMORY_INPUT" in
            3G|4G|5G|6G) ;;
            *) echo "::error::Invalid memory value '$MEMORY_INPUT'. Use one of: 3G,4G,5G,6G"; exit 1 ;;
          esac

          if ! [[ "$DURATION_INPUT" =~ ^[0-9]+$ ]]; then
            echo "::error::Duration must be numeric. Got '$DURATION_INPUT'"
            exit 1
          fi
          if [ "$DURATION_INPUT" -lt 10 ] || [ "$DURATION_INPUT" -gt 350 ]; then
            echo "::error::Duration must be between 10 and 350 minutes."
            exit 1
          fi

          echo "RUNTIME_MEMORY=$MEMORY_INPUT" >> "$GITHUB_ENV"
          echo "RUNTIME_DURATION=$DURATION_INPUT" >> "$GITHUB_ENV"

      - name: Preflight checks
        env:
          PLAYIT_SECRET_KEY: ${{ secrets.PLAYIT_SECRET_KEY }}
          PLAYIT_SECRET: ${{ secrets.PLAYIT_SECRET }}
        run: |
          test -f "scripts/install-mods.sh"
          test -f "config/mods.lock.json"
          test -f "server.properties"

          if [ -z "${PLAYIT_SECRET_KEY}${PLAYIT_SECRET}" ]; then
            echo "::warning::No PLAYIT secret configured. Tunnel will run in claim/guest mode and sharing may be unstable."
          fi

          cat > join_info.txt <<'EOF'
          status=starting
          java_host=unknown
          java_port=25565
          bedrock_host=unknown
          bedrock_port=19132
          source=workflow_preflight
          EOF

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Download Fabric server
        run: |
          URL="https://meta.fabricmc.net/v2/versions/loader/${MC_VERSION}/${FABRIC_LOADER_VERSION}/${FABRIC_INSTALLER_VERSION}/server/jar"
          curl -fsSL "$URL" -o fabric-server.jar
          test -s fabric-server.jar
          ls -lh fabric-server.jar

      - name: Install server mods from lock file
        run: |
          chmod +x scripts/install-mods.sh
          ./scripts/install-mods.sh

      - name: Verify required bridge mods
        run: |
          test -f mods/geyser-fabric.jar
          test -f mods/floodgate-fabric.jar
          echo "Bridge mods verified"

      - name: Accept EULA
        run: echo "eula=true" > eula.txt

      - name: Apply custom MOTD
        if: github.event.inputs.motd != ''
        run: |
          sed -i "s|^motd=.*|motd=${{ github.event.inputs.motd }}|" server.properties

      - name: Configure RCON
        env:
          RCON_PASSWORD: ${{ secrets.RCON_PASSWORD }}
        run: |
          if [ -n "$RCON_PASSWORD" ]; then
            sed -i "s|^rcon.password=.*|rcon.password=$RCON_PASSWORD|" server.properties
          else
            RANDOM_PW=$(openssl rand -hex 16)
            sed -i "s|^rcon.password=.*|rcon.password=$RANDOM_PW|" server.properties
            echo "::notice::RCON_PASSWORD not set. Generated temporary password."
          fi

      - name: Restore world persistence cache
        id: cache-persistence
        uses: actions/cache@v4
        with:
          path: |
            world
            config
            playit.toml
            join_info.txt
          key: pak-mc-root-persistence-${{ github.run_id }}
          restore-keys: |
            pak-mc-root-persistence-

      - name: Reset incompatible Floodgate config
        run: |
          rm -f config/floodgate/config.yml
          mkdir -p config/floodgate
          echo "::notice::Reset floodgate config for clean generation."

      - name: Install playit.gg agent
        run: |
          curl -fsSL https://github.com/playit-cloud/playit-agent/releases/latest/download/playit-linux-amd64 -o playit
          chmod +x playit

      - name: Start playit tunnel
        env:
          PLAYIT_SECRET: ${{ secrets.PLAYIT_SECRET_KEY || secrets.PLAYIT_SECRET }}
        run: |
          if [ -n "$PLAYIT_SECRET" ]; then
            nohup ./playit --secret "$PLAYIT_SECRET" > playit.log 2>&1 &
          else
            nohup ./playit > playit.log 2>&1 &
          fi
          echo $! > playit.pid
          sleep 20
          cat playit.log || true

      - name: Resolve join endpoints
        run: |
          IP=$(grep -oE 'tcp://[a-z0-9.-]+:[0-9]+' playit.log | head -n1 | sed 's|tcp://||')
          [ -z "$IP" ] && IP=$(grep -oE '[a-z0-9-]+\.at\.ply\.gg:[0-9]+' playit.log | head -n1)
          [ -z "$IP" ] && IP=$(grep -oE '[a-z0-9-]+\.ply\.gg:[0-9]+' playit.log | head -n1)
          [ -z "$IP" ] && IP=$(grep -iE 'address|connect|host' playit.log | grep -oE '[a-z0-9.-]+\.[a-z]{2,}:[0-9]+' | head -n1)

          if [ -n "$IP" ]; then
            HOST="${IP%:*}"
            PORT="${IP#*:}"
            cat > join_info.txt <<EOF
            status=ready
            java_host=$HOST
            java_port=$PORT
            bedrock_host=$HOST
            bedrock_port=19132
            source=playit_log
            EOF
            echo "Join endpoint: $HOST:$PORT"
          else
            cat > join_info.txt <<'EOF'
            status=degraded
            java_host=unknown
            java_port=25565
            bedrock_host=unknown
            bedrock_port=19132
            source=playit_log_missing
            EOF
            echo "::warning::Could not resolve tunnel endpoint from playit.log"
          fi

      - name: Schedule graceful shutdown
        run: |
          (
            sleep $((RUNTIME_DURATION * 60))
            echo "Duration reached. Requesting graceful shutdown."
            pkill -SIGTERM -f "fabric-server.jar" || true
          ) &

      - name: Start Minecraft server
        run: |
          java -Xmx${RUNTIME_MEMORY} -Xms2G \
            -XX:+UseG1GC \
            -XX:+ParallelRefProcEnabled \
            -XX:MaxGCPauseMillis=200 \
            -XX:+UnlockExperimentalVMOptions \
            -XX:+DisableExplicitGC \
            -XX:+AlwaysPreTouch \
            -XX:G1NewSizePercent=30 \
            -XX:G1MaxNewSizePercent=40 \
            -XX:G1HeapRegionSize=8M \
            -XX:G1ReservePercent=20 \
            -XX:G1HeapWastePercent=5 \
            -XX:G1MixedGCCountTarget=4 \
            -XX:InitiatingHeapOccupancyPercent=15 \
            -XX:G1MixedGCLiveThresholdPercent=90 \
            -XX:G1RSetUpdatingPauseTimePercent=5 \
            -XX:SurvivorRatio=32 \
            -XX:+PerfDisableSharedMem \
            -XX:MaxTenuringThreshold=1 \
            -Dusing.aikars.flags=https://mcflags.emc.gs \
            -Daikars.new.flags=true \
            -jar fabric-server.jar nogui

      - name: Upload world backup
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: world-backup-${{ github.run_number }}
          path: |
            world/
            logs/
          retention-days: 30
          if-no-files-found: warn

      - name: Upload runtime diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: runtime-diagnostics-${{ github.run_number }}
          path: |
            join_info.txt
            playit.log
            logs/latest.log
          retention-days: 14
          if-no-files-found: ignore
