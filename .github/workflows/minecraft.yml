name: 🎮 PAK MC SERVER

on:
  workflow_dispatch:
    inputs:
      memory:
        description: "RAM Allocation (e.g. 5G, 8G)"
        required: false
        default: "6G"
      duration:
        description: "Run Duration (minutes)"
        required: false
        default: "340"
      motd:
        description: "Server Message (MOTD)"
        required: false
        default: "PAK MC SERVER — Now in Root Mode"

jobs:
  minecraft:
    name: 🎮 PAK MC SERVER
    runs-on: ubuntu-latest

    env:
      MC_VERSION: "1.21.1"
      FABRIC_LOADER_VERSION: "0.16.9"
      FABRIC_INSTALLER_VERSION: "1.0.1"

    steps:
      # ── 1. Checkout Repository ─────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Greeting & Setup ────────────────────────────────────────────────
      - name: Welcome message
        run: |
          echo "════════════════════════════════════════════════════"
          echo "   🇵🇰  PAK MC SERVER — INFRASTRUCTURE STARTUP  🇵🇰   "
          echo "════════════════════════════════════════════════════"

      # ── 3. Java 21 ─────────────────────────────────────────────────────────
      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      # ── 4. Download Fabric server JAR ──────────────────────────────────────
      - name: Download Fabric server
        run: |
          echo "⬇️  Downloading Fabric server for MC $MC_VERSION..."
          URL="https://meta.fabricmc.net/v2/versions/loader/${MC_VERSION}/${FABRIC_LOADER_VERSION}/${FABRIC_INSTALLER_VERSION}/server/jar"
          curl -fsSL "$URL" -o fabric-server.jar
          ls -lh fabric-server.jar

      # ── 5. Install mods ────────────────────────────────────────────────────
      - name: Install server mods
        env:
          MC_VERSION: ${{ env.MC_VERSION }}
        run: |
          chmod +x scripts/install-mods.sh
          ./scripts/install-mods.sh

      # ── 6. Accept EULA ─────────────────────────────────────────────────────
      - name: Accept EULA
        run: echo "eula=true" > eula.txt

      # ── 7. Apply custom MOTD if provided ───────────────────────────────────
      - name: Apply custom MOTD
        if: github.event.inputs.motd != ''
        run: |
          sed -i "s|^motd=.*|motd=${{ github.event.inputs.motd }}|" server.properties

      # ── 8. Configure RCON ──────────────────────────────────────────────────
      - name: Configure RCON
        env:
          RCON_PASSWORD: ${{ secrets.RCON_PASSWORD }}
        run: |
          if [ -n "$RCON_PASSWORD" ]; then
            sed -i "s|^rcon.password=.*|rcon.password=$RCON_PASSWORD|" server.properties
            echo "✅ RCON password set from secret"
          else
            RANDOM_PW=$(openssl rand -hex 16)
            sed -i "s|^rcon.password=.*|rcon.password=$RANDOM_PW|" server.properties
            echo "::notice::RCON password randomized"
          fi

      # ── 9. Restore persistence from cache ──────────────────────────────────
      - name: Restore persistence from cache
        id: cache-persistence
        uses: actions/cache@v4
        with:
          path: |
            world
            config
            playit.toml
          key: pak-mc-root-persistence-${{ github.run_id }}
          restore-keys: |
            pak-mc-root-persistence-

      # ── 10. Install playit.gg agent ────────────────────────────────────────
      - name: Install playit.gg agent
        run: |
          echo "⬇️  Downloading playit.gg agent..."
          curl -SsL https://github.com/playit-gg/playit-agent/releases/latest/download/playit-linux-amd64 -o playit
          chmod +x playit

      # ── 11. Start Geyser Bridge (Background) ───────────────────────────────
      - name: Start Geyser Bridge
        run: |
          echo "🌉 Initializing Geyser-Standalone Bridge..."
          mkdir -p config/geyser-standalone
          # Run Geyser in background. It will auto-generate config if missing or use ours.
          nohup java -jar Geyser.jar --config config/geyser-standalone/config.yml > geyser.log 2>&1 &
          echo "✅ Geyser Bridge started in background"

      # ── 12. Start playit tunnel ────────────────────────────────────────────
      - name: Start playit tunnel
        env:
          PLAYIT_SECRET: ${{ secrets.PLAYIT_SECRET_KEY }}
        run: |
          if [ -z "$PLAYIT_SECRET" ]; then
            echo "::warning::No PLAYIT_SECRET_KEY secret — starting playit in guest mode"
            nohup ./playit -s --stdout > playit.log 2>&1 &
          else
            echo "🔒 Starting playit with agent secret..."
            nohup ./playit -s --secret "$PLAYIT_SECRET" --stdout > playit.log 2>&1 &
          fi
          sleep 6
          echo "────── playit.log ──────"
          cat playit.log || true
          echo "────────────────────────"

      # ── 12. Schedule graceful shutdown ─────────────────────────────────────
      - name: Schedule graceful shutdown
        env:
          DURATION_MIN: ${{ github.event.inputs.duration || '340' }}
        run: |
          (
            sleep $((DURATION_MIN * 60))
            echo "⏰ Duration limit reached — sending /stop to server"
            pkill -SIGTERM -f "fabric-server.jar" || true
          ) &
          echo "Shutdown timer armed: $DURATION_MIN min"

      # ── 13. Start the Minecraft server ─────────────────────────────────────
      - name: Start Minecraft server
        env:
          MEMORY: ${{ github.event.inputs.memory || '6G' }}
        run: |
          echo "🚀 Launching server with ${MEMORY} RAM (Root Mode)"
          echo "════════════════════════════════════════════════════"
          java -Xmx${MEMORY} -Xms2G \
            -XX:+UseG1GC \
            -XX:+ParallelRefProcEnabled \
            -XX:MaxGCPauseMillis=200 \
            -XX:+UnlockExperimentalVMOptions \
            -XX:+DisableExplicitGC \
            -XX:+AlwaysPreTouch \
            -XX:G1NewSizePercent=30 \
            -XX:G1MaxNewSizePercent=40 \
            -XX:G1HeapRegionSize=8M \
            -XX:G1ReservePercent=20 \
            -XX:G1HeapWastePercent=5 \
            -XX:G1MixedGCCountTarget=4 \
            -XX:InitiatingHeapOccupancyPercent=15 \
            -XX:G1MixedGCLiveThresholdPercent=90 \
            -XX:G1RSetUpdatingPauseTimePercent=5 \
            -XX:SurvivorRatio=32 \
            -XX:+PerfDisableSharedMem \
            -XX:MaxTenuringThreshold=1 \
            -Dusing.aikars.flags=https://mcflags.emc.gs \
            -Daikars.new.flags=true \
            -jar fabric-server.jar nogui

      # ── 14. Upload world save as artifact ──────────────────────────────────
      - name: Upload world backup
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: world-backup-${{ github.run_number }}
          path: |
            world/
            logs/
          retention-days: 30
          if-no-files-found: warn

      # ── 15. Upload playit log for debugging ────────────────────────────────
      - name: Upload playit log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playit-log-${{ github.run_number }}
          path: playit.log
          retention-days: 7
          if-no-files-found: ignore
