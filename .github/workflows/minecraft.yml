name: 🎮 PAK MC SERVER

on:
  workflow_dispatch:
    inputs:
      memory:
        description: "RAM Allocation (e.g. 5G, 8G)"
        required: false
        default: "6G"
      duration:
        description: "Run Duration (minutes)"
        required: false
        default: "340"
      motd:
        description: "Server Message (MOTD)"
        required: false
        default: "PAK MC SERVER — We Will Rise Again"

jobs:
  minecraft:
    name: 🎮 PAK MC SERVER
    runs-on: ubuntu-latest

    env:
      MC_VERSION: "1.21.1"
      FABRIC_LOADER_VERSION: "0.16.9"
      FABRIC_INSTALLER_VERSION: "1.0.1"

    steps:
      # ── 1. Checkout Repository ─────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Greeting & Setup ────────────────────────────────────────────────
      - name: Welcome message
        run: |
          echo "════════════════════════════════════════════════════"
          echo "   🇵🇰  PAK MC SERVER — INFRASTRUCTURE STARTUP  🇵🇰   "
          echo "════════════════════════════════════════════════════"

      # ── 3. Java 21 ─────────────────────────────────────────────────────────
      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      # ── 4. Download Fabric server JAR ──────────────────────────────────────
      - name: Download Fabric server
        run: |
          echo "⬇️  Downloading Fabric server for MC $MC_VERSION..."
          URL="https://meta.fabricmc.net/v2/versions/loader/${MC_VERSION}/${FABRIC_LOADER_VERSION}/${FABRIC_INSTALLER_VERSION}/server/jar"
          curl -fsSL "$URL" -o fabric-server.jar
          ls -lh fabric-server.jar

      # ── 5. Install mods ────────────────────────────────────────────────────
      - name: Install server mods
        env:
          MC_VERSION: ${{ env.MC_VERSION }}
        run: |
          chmod +x scripts/install-mods.sh
          ./scripts/install-mods.sh

      # ── 6. Accept EULA ─────────────────────────────────────────────────────
      - name: Accept EULA
        run: echo "eula=true" > eula.txt

      # ── 7. Apply custom MOTD if provided ───────────────────────────────────
      - name: Apply custom MOTD
        if: github.event.inputs.motd != ''
        run: |
          sed -i "s|^motd=.*|motd=${{ github.event.inputs.motd }}|" server.properties

      # ── 8. Configure RCON ──────────────────────────────────────────────────
      - name: Configure RCON
        env:
          RCON_PASSWORD: ${{ secrets.RCON_PASSWORD }}
        run: |
          if [ -n "$RCON_PASSWORD" ]; then
            sed -i "s|^rcon.password=.*|rcon.password=$RCON_PASSWORD|" server.properties
            echo "✅ RCON password set from secret"
          else
            RANDOM_PW=$(openssl rand -hex 16)
            sed -i "s|^rcon.password=.*|rcon.password=$RANDOM_PW|" server.properties
            echo "::notice::RCON password randomized"
          fi

      # ── 9. Restore persistence from cache ──────────────────────────────────
      - name: Restore persistence from cache
        id: cache-persistence
        uses: actions/cache@v4
        with:
          path: |
            world
            config
            playit.toml
          key: pak-mc-root-persistence-${{ github.run_id }}
          restore-keys: |
            pak-mc-root-persistence-

      # ── 10. Install playit.gg agent ────────────────────────────────────────
      - name: Install playit.gg agent
        run: |
          echo "⬇️  Downloading playit.gg agent..."
          curl -SsL https://github.com/playit-gg/playit-agent/releases/latest/download/playit-linux-amd64 -o playit
          chmod +x playit

      # ── 11. Start Geyser Bridge (Background) ───────────────────────────────
      - name: Start Geyser Bridge
        run: |
          echo "🌉 Starting Geyser-Standalone Bridge (Bedrock support)..."
          mkdir -p config/geyser-standalone
          nohup java -jar Geyser.jar --config config/geyser-standalone/config.yml > geyser.log 2>&1 &
          echo $! > geyser.pid
          sleep 5
          echo "✅ Geyser Bridge started (PID: $(cat geyser.pid))"
          cat geyser.log | tail -5 || true

      # ── 12. Start playit tunnel ────────────────────────────────────────────
      - name: Start playit tunnel
        env:
          PLAYIT_SECRET: ${{ secrets.PLAYIT_SECRET_KEY }}
        run: |
          if [ -z "$PLAYIT_SECRET" ]; then
            echo "::warning::No PLAYIT_SECRET_KEY — starting in guest mode (claim URL will appear below)"
            nohup ./playit > playit.log 2>&1 &
          else
            echo "🔒 Starting playit with saved secret..."
            nohup ./playit --secret "$PLAYIT_SECRET" > playit.log 2>&1 &
          fi
          # Give it time to connect and get an address
          sleep 20
          echo "────── playit.log ──────"
          cat playit.log || true
          echo "────────────────────────"

      # ── 13. Parse tunnel + write status.json + start heartbeat ───────────────
      - name: Publish tunnel address & start status heartbeat
        env:
          GH_TOKEN: ${{ secrets.GH_DISPATCH_TOKEN }}
          GH_REPO: ${{ github.repository }}
        run: |
          # ── Parse real playit tunnel addresses ──────────────────────────────
          JAVA_HOST=$(grep -oP '[\w-]+\.gl\.joinmc\.link' playit.log 2>/dev/null | head -1 || echo "")
          [ -z "$JAVA_HOST" ] && JAVA_HOST=$(grep -oE '[a-z0-9-]+\.joinmc\.link' playit.log 2>/dev/null | head -1 || echo "")
          BEDROCK_HOST=$(grep -oP '[\w-]+\.gl\.at\.ply\.gg' playit.log 2>/dev/null | head -1 || echo "")
          BEDROCK_PORT=$(grep -oP '[\w-]+\.gl\.at\.ply\.gg:\K[0-9]+' playit.log 2>/dev/null | head -1 || echo "19132")
          [ -z "$JAVA_HOST" ]    && JAVA_HOST="mc.pakanonymous.org"
          [ -z "$BEDROCK_HOST" ] && BEDROCK_HOST="mc.pakanonymous.org"

          echo "JAVA_HOST=$JAVA_HOST"       >> "$GITHUB_ENV"
          echo "BEDROCK_HOST=$BEDROCK_HOST" >> "$GITHUB_ENV"
          echo "BEDROCK_PORT=$BEDROCK_PORT" >> "$GITHUB_ENV"
          echo "SERVER_START_TS=$(date -u +%s)" >> "$GITHUB_ENV"

          echo ""
          echo "╔══════════════════════════════════════════════════════╗"
          echo "║      🇵🇰  PAK MC SERVER — HOW TO JOIN  🇵🇰           ║"
          echo "╠══════════════════════════════════════════════════════╣"
          echo "║  ☕ JAVA / TLAUNCHER:                               ║"
          echo "║     Server IP: $JAVA_HOST"
          echo "║     Port:      25565 (default)                      ║"
          echo "╠══════════════════════════════════════════════════════╣"
          echo "║  🎮 BEDROCK (Xbox / Mobile / PS / Switch / Win10): ║"
          echo "║     Address:   $BEDROCK_HOST"
          echo "║     Port:      $BEDROCK_PORT"
          echo "╚══════════════════════════════════════════════════════╝"

          # ── Write initial status.json ────────────────────────────────────────
          if [ -n "$GH_TOKEN" ]; then
            STATUS_SHA=$(curl -sf -H "Authorization: Bearer $GH_TOKEN" \
              "https://api.github.com/repos/$GH_REPO/contents/server/status.json" \
              | python3 -c "import sys,json; print(json.load(sys.stdin).get('sha',''))" 2>/dev/null || echo "")
            STATUS_BODY=$(python3 -c "
import json, time, os
ts = int(time.time())
print(json.dumps({
  'online': True,
  'start_ts': ts,
  'last_seen': ts,
  'version': '1.21.1',
  'max_players': 20,
  'players': 0,
  'run_id': os.environ.get('GITHUB_RUN_ID',''),
  'java_host': os.environ.get('JAVA_HOST','mc.pakanonymous.org'),
  'bedrock_host': os.environ.get('BEDROCK_HOST','mc.pakanonymous.org'),
  'bedrock_port': int(os.environ.get('BEDROCK_PORT','19132')),
}))
")
            STATUS_B64=$(printf '%s' "$STATUS_BODY" | base64 -w 0)
            STATUS_PUT="{\"message\":\"runtime: server online\",\"content\":\"$STATUS_B64\""
            [ -n "$STATUS_SHA" ] && STATUS_PUT="$STATUS_PUT,\"sha\":\"$STATUS_SHA\""
            STATUS_PUT="$STATUS_PUT}"
            curl -sf -X PUT -H "Authorization: Bearer $GH_TOKEN" -H "Content-Type: application/json" \
              "https://api.github.com/repos/$GH_REPO/contents/server/status.json" \
              -d "$STATUS_PUT" > /dev/null && echo "✅ status.json written" || echo "⚠️  status.json write failed"
          fi

          # ── Start background status heartbeat (every 60s) ────────────────────
          (
            TICK=0
            while true; do
              sleep 15
              TICK=$((TICK + 1))
              [ $((TICK % 4)) -ne 0 ] && continue
              [ -z "$GH_TOKEN" ] && continue
              PLAYER_LINE=$(cat server-console.log 2>/dev/null | grep "There are" | tail -1 || echo "")
              PLAYER_COUNT=$(echo "$PLAYER_LINE" | grep -oP 'There are \K[0-9]+' 2>/dev/null || echo "0")
              ST_SHA=$(curl -sf -H "Authorization: Bearer $GH_TOKEN" \
                "https://api.github.com/repos/$GH_REPO/contents/server/status.json" \
                | python3 -c "import sys,json; print(json.load(sys.stdin).get('sha',''))" 2>/dev/null || echo "")
              ST_BODY=$(python3 -c "
import json, time, os
print(json.dumps({
  'online': True,
  'start_ts': int(os.environ.get('SERVER_START_TS', str(int(time.time())))),
  'last_seen': int(time.time()),
  'version': '1.21.1',
  'max_players': 20,
  'players': int('${PLAYER_COUNT:-0}'),
  'run_id': os.environ.get('GITHUB_RUN_ID',''),
  'java_host': os.environ.get('JAVA_HOST','mc.pakanonymous.org'),
  'bedrock_host': os.environ.get('BEDROCK_HOST','mc.pakanonymous.org'),
  'bedrock_port': int(os.environ.get('BEDROCK_PORT','19132')),
}))
")
              ST_B64=$(printf '%s' "$ST_BODY" | base64 -w 0)
              ST_PUT="{\"message\":\"runtime: heartbeat\",\"content\":\"$ST_B64\""
              [ -n "$ST_SHA" ] && ST_PUT="$ST_PUT,\"sha\":\"$ST_SHA\""
              ST_PUT="$ST_PUT}"
              curl -sf -X PUT -H "Authorization: Bearer $GH_TOKEN" -H "Content-Type: application/json" \
                "https://api.github.com/repos/$GH_REPO/contents/server/status.json" \
                -d "$ST_PUT" > /dev/null 2>&1 || true
            done
          ) &
          echo $! > /tmp/heartbeat.pid
          echo "💓 Status heartbeat started (PID $(cat /tmp/heartbeat.pid))"

      # ── 14. Schedule graceful shutdown ─────────────────────────────────────
      - name: Schedule graceful shutdown
        env:
          DURATION_MIN: ${{ github.event.inputs.duration || '340' }}
        run: |
          (
            sleep $((DURATION_MIN * 60))
            echo "⏰ Duration limit reached — stopping server"
            pkill -SIGTERM -f "fabric-server.jar" || true
          ) &
          echo "⏱️  Shutdown timer armed: $DURATION_MIN minutes"

      # ── 15. Start the Minecraft server ────────────────────────────────────
      - name: Start Minecraft server
        env:
          MEMORY: ${{ github.event.inputs.memory || '6G' }}
        run: |
          echo "🚀 Launching server with ${MEMORY} RAM"
          echo "════════════════════════════════════════════════════"
          java -Xmx${MEMORY} -Xms2G \
            -XX:+UseG1GC \
            -XX:+ParallelRefProcEnabled \
            -XX:MaxGCPauseMillis=200 \
            -XX:+UnlockExperimentalVMOptions \
            -XX:+DisableExplicitGC \
            -XX:+AlwaysPreTouch \
            -XX:G1NewSizePercent=30 \
            -XX:G1MaxNewSizePercent=40 \
            -XX:G1HeapRegionSize=8M \
            -XX:G1ReservePercent=20 \
            -XX:G1HeapWastePercent=5 \
            -XX:G1MixedGCCountTarget=4 \
            -XX:InitiatingHeapOccupancyPercent=15 \
            -XX:G1MixedGCLiveThresholdPercent=90 \
            -XX:G1RSetUpdatingPauseTimePercent=5 \
            -XX:SurvivorRatio=32 \
            -XX:+PerfDisableSharedMem \
            -XX:MaxTenuringThreshold=1 \
            -Dusing.aikars.flags=https://mcflags.emc.gs \
            -Daikars.new.flags=true \
            -jar fabric-server.jar nogui

      # ── 15b. Write offline status after server stops ──────────────────────
      - name: Write offline status
        if: always()
        env:
          GH_TOKEN: ${{ secrets.GH_DISPATCH_TOKEN }}
          GH_REPO: ${{ github.repository }}
        run: |
          [ -z "$GH_TOKEN" ] && exit 0
          ST_SHA=$(curl -sf -H "Authorization: Bearer $GH_TOKEN" \
            "https://api.github.com/repos/$GH_REPO/contents/server/status.json" \
            | python3 -c "import sys,json; print(json.load(sys.stdin).get('sha',''))" 2>/dev/null || echo "")
          ST_BODY=$(python3 -c "
import json, time, os
print(json.dumps({
  'online': False,
  'start_ts': int(os.environ.get('SERVER_START_TS', '0')),
  'last_seen': int(time.time()),
  'version': '1.21.1',
  'max_players': 20,
  'players': 0,
  'run_id': os.environ.get('GITHUB_RUN_ID',''),
  'java_host': os.environ.get('JAVA_HOST','mc.pakanonymous.org'),
  'bedrock_host': os.environ.get('BEDROCK_HOST','mc.pakanonymous.org'),
  'bedrock_port': int(os.environ.get('BEDROCK_PORT','19132')),
}))
")
          ST_B64=$(printf '%s' "$ST_BODY" | base64 -w 0)
          ST_PUT="{\"message\":\"runtime: server offline\",\"content\":\"$ST_B64\""
          [ -n "$ST_SHA" ] && ST_PUT="$ST_PUT,\"sha\":\"$ST_SHA\""
          ST_PUT="$ST_PUT}"
          curl -sf -X PUT -H "Authorization: Bearer $GH_TOKEN" -H "Content-Type: application/json" \
            "https://api.github.com/repos/$GH_REPO/contents/server/status.json" \
            -d "$ST_PUT" > /dev/null && echo "✅ offline status written" || echo "⚠️  offline status write failed"

      # ── 16. Upload world save as artifact ─────────────────────────────────
      - name: Upload world backup
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: world-backup-${{ github.run_number }}
          path: |
            world/
            logs/
          retention-days: 30
          if-no-files-found: warn

      # ── 17. Upload playit & geyser logs ───────────────────────────────────
      - name: Upload debug logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: debug-logs-${{ github.run_number }}
          path: |
            playit.log
            geyser.log
          retention-days: 7
          if-no-files-found: ignore
